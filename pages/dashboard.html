<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorMX - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <!-- Barra de Navegación -->
    <nav class="bg-[#0a0a0a] text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-red-600 p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M12 14l9-5-9-5-9 5 9 5z"></path>
                            <path
                                d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                            </path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold">TutorMX</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userGreeting" class="text-sm text-gray-300">Hola, Estudiante</span>
                    <a href="../index.html"
                        class="text-sm bg-red-600 hover:bg-red-700 px-4 py-2 rounded-md transition-colors">Salir</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Búsqueda -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Encuentra a tu Tutor</h1>
                <p class="text-gray-500 mt-1">Busca por materia, tecnología o nombre.</p>
            </div>
            <div class="w-full md:w-1/3">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input type="text" id="buscador"
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-[#2563EB] focus:border-[#2563EB] sm:text-sm"
                        placeholder="Ej. PostgreSQL, Vue, Matemáticas...">
                </div>
            </div>
        </div>

        <!-- Contenedor de Tarjetas de Tutores -->
        <div id="contenedor-tutores" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Tarjetas dinámicas -->
        </div>

        <!-- Mis Tutorías Agendadas -->
        <div class="mt-16 border-t border-gray-200 pt-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Mis Tutorías Agendadas</h2>
                <!-- Aquí se calcula el resultado dinámico -->
                <span id="contador-citas" class="bg-blue-100 text-[#2563EB] text-sm font-bold px-3 py-1 rounded-full">0
                    tutorías</span>
            </div>

            <div id="contenedor-citas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Las citas reservadas se inyectarán aquí -->
            </div>
        </div>

        <!-- Modal para Agendar Tutoría -->
        <div id="modal-agendar"
            class="fixed inset-0 z-50 hidden bg-black bg-opacity-50 flex justify-center items-center backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden">
                <div class="bg-[#0a0a0a] px-6 py-4 flex justify-between items-center text-white">
                    <h3 class="text-xl font-bold">Agendar Tutoría</h3>
                    <button onclick="cerrarModal()" class="text-gray-400 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="p-6">
                    <p class="text-gray-600 mb-4">Estás a punto de agendar una sesión con <span id="nombre-tutor-modal"
                            class="font-bold text-[#2563EB]"></span>.</p>
                    <form id="form-cita" onsubmit="guardarCita(event)">
                        <input type="hidden" id="tutor-id-modal">

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
                                <input type="date" id="fecha-cita"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]"
                                    required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Hora</label>
                                <input type="time" id="hora-cita"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]"
                                    required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tema específico a
                                revisar</label>
                            <textarea id="tema-cita" rows="3"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]"
                                placeholder="Ej. Ayuda con mi proyecto de integradora..." required></textarea>
                        </div>

                        <div id="mensaje-error-modal" class="hidden mb-4 text-sm text-red-600 font-medium"></div>

                        <div class="flex justify-end gap-3 mt-6">
                            <button type="button" onclick="cerrarModal()"
                                class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-md font-medium transition-colors">Cancelar</button>
                            <button type="submit"
                                class="px-4 py-2 text-white bg-[#2563EB] hover:bg-blue-700 rounded-md font-medium transition-colors">Confirmar
                                Cita</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/dashboard.js"></script>
</body>

</html>
