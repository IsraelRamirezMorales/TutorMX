version: '3.8'

services:
  # Frontend service running Vue 3 / Vite (Dev environment)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: Tu_Asesoria_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  # Backend service running PHP Laravel API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: Tu_Asesoria_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
