<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorMX - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex h-screen w-full font-sans antialiased bg-white text-gray-900">

    <!-- Panel Izquierdo -->
    <div class="hidden lg:flex w-1/2 bg-[#0a0a0a] text-white flex-col justify-center items-center p-12">
        <div class="bg-red-600 p-4 rounded-2xl mb-6">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M12 14l9-5-9-5-9 5 9 5z"></path>
                <path
                    d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                </path>
            </svg>
        </div>

        <h1 class="text-4xl font-bold mb-4">Welcome to TutorMX</h1>
        <p class="text-gray-400 text-center max-w-md mb-12">
            Connect with university students and teachers for academic advising and tutoring sessions
        </p>

        <!-- Estadísticas -->
        <div class="flex gap-8">
            <div class="flex flex-col items-center">
                <div class="bg-red-950 p-3 rounded-xl border border-red-800 text-red-500 mb-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                        </path>
                    </svg>
                </div>
                <span class="text-sm font-medium">100+ Subjects</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-red-950 p-3 rounded-xl border border-red-800 text-red-500 mb-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                        </path>
                    </svg>
                </div>
                <span class="text-sm font-medium">5K+ Tutors</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-red-950 p-3 rounded-xl border border-red-800 text-red-500 mb-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z">
                        </path>
                    </svg>
                </div>
                <span class="text-sm font-medium">4.9 Rating</span>
            </div>
        </div>
    </div>

    <!-- Panel Derecho -->
    <div class="w-full lg:w-1/2 flex justify-center items-center p-8 bg-gray-50">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">

            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold mb-1">TutorMX</h2>
                <p class="text-sm text-gray-500">Sign in to your account or create a new one</p>
            </div>

            <div class="flex bg-gray-100 p-1 rounded-lg mb-6">
                <button id="tabLogin"
                    class="flex-1 py-2 text-sm font-medium rounded-md bg-white shadow-sm transition-all"
                    onclick="switchTab('login')">Login</button>
                <button id="tabRegister"
                    class="flex-1 py-2 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700 transition-all"
                    onclick="switchTab('register')">Register</button>
            </div>

            <form id="authForm" onsubmit="handleFormSubmit(event)">
                <div id="registerFields" class="hidden space-y-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="name" placeholder="Ej. Israel Ramirez"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                        <select id="role"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]">
                            <option value="">Select your role...</option>
                            <option value="student">Student</option>
                            <option value="tutor">Tutor</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Subject of Interest</label>
                        <input type="text" id="subject" placeholder="Math, Programming, etc."
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]">
                    </div>
                </div>

                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" placeholder="student@university.edu"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" placeholder="Enter your password"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2563EB]">
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-[#2563EB] hover:bg-blue-700 text-white font-medium py-2 rounded-md transition-colors mb-6">
                    Sign In
                </button>

                <div class="relative flex items-center py-2 mb-6">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-xs text-gray-400 uppercase">Or continue with</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <button type="button"
                    class="w-full flex justify-center items-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 rounded-md transition-colors">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>
            </form>

            <div id="feedbackMessage" class="mt-4 text-center text-sm hidden"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
